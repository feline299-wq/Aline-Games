<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster Mayhem</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Monster Mayhem</h1>

    <section class="game-info">
      <p>
        Select a hexagon to move the monster. The blue hexagon is the selected tile.
        Green tiles show where the monster can move next.
      </p>
      <p id="status">Click a highlighted green hexagon to move the monster.</p>
    </section>

    <section id="board" aria-label="Monster Mayhem hexagon board"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
