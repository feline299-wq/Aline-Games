<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster Mayhem</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Monster Mayhem</h1>

    <section class="game-info">
      <p>
        Move the monster around the hexagon board and collect all crystals.
      </p>

      <div class="score-box">
        <span id="score">Score: 0 / 3</span>
        <span id="moves">Moves left: 15</span>
      </div>

      <p id="status">Click the monster tile to show possible moves.</p>
    </section>

    <section id="board" aria-label="Monster Mayhem hexagon board"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
