<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster Mayhem</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Monster Mayhem</h1>

    <section class="game-info">
      <p>
        Click the monster tile to see possible moves. Move the monster to collect crystals.
      </p>

      <p id="status">Click the monster tile to start.</p>

      <p>
        Score: <span id="score">0</span> |
        Moves left: <span id="moves">10</span>
      </p>
    </section>

    <section id="board" aria-label="Monster Mayhem hexagon board"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
